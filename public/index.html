<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <title>Live Chat Reader - Enterprise Edition</title>
  <style>
    /* ==========================================================================
       THEME VARIABLES & CORE DEFINITIONS
       ========================================================================== */
    :root {
      --bg: #0f0f23;
      --fg: #e8e8e8;
      --card: #1a1a2e;
      --header-bg: #16213e;
      --name: #4fc3f7;
      --uid: #90a4ae;
      --orange: #ff9800;
      --border: #2d3748;
      --hover: #252545;
      --shadow: rgba(0, 0, 0, 0.3);
      --transition-smooth: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html.light {
      --bg: #f5f7fa;
      --fg: #2d3748;
      --card: #ffffff;
      --header-bg: #ffffff;
      --name: #1976d2;
      --uid: #64748b;
      --border: #e2e8f0;
      --hover: #f1f5f9;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg);
      overflow: hidden; transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* CSS Spinner cho trạng thái Loading */
    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 2px solid #fff;
      width: 14px; height: 14px;
      animation: spin 0.6s linear infinite;
      display: inline-block; margin-right: 6px; vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pulse-connecting {
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* SPECIFICITY MANAGEMENT OVER TAILWIND */
    header.app-header {
      padding: 10px 20px; background: var(--header-bg);
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      box-shadow: 0 2px 8px var(--shadow); border-bottom: 1px solid var(--border);
    }

    header.app-header .input-user {
      padding: 8px 14px; border: 2px solid var(--border); border-radius: 6px;
      background: var(--card); color: var(--fg); font-size: 14px; min-width: 220px;
      transition: var(--transition-smooth);
    }

    header.app-header .input-user:focus {
      outline: none; border-color: #2196f3; box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.2);
    }

    header.app-header .btn-control {
      border: none; padding: 8px 16px; color: #ffffff; border-radius: 6px;
      cursor: pointer; font-weight: 600; font-size: 14px;
      transition: var(--transition-smooth); box-shadow: 0 2px 4px var(--shadow);
    }

    header.app-header .btn-control:hover:not(:disabled) {
      transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); filter: brightness(1.1);
    }

    header.app-header .btn-control:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none;
    }

    header.app-header .btn-connect { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
    header.app-header .btn-clear { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }
    header.app-header .btn-gift-rank { background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%); }
    header.app-header .btn-like-rank { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }

    header.app-header input[type="checkbox"].toggle-switch {
      width: 40px; height: 20px; appearance: none; background: #cbd5e0;
      border-radius: 20px; position: relative; cursor: pointer; transition: var(--transition-smooth);
    }

    header.app-header input[type="checkbox"].toggle-switch::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      border-radius: 50%; background: white; top: 2px; left: 2px; transition: var(--transition-smooth);
    }

    header.app-header input[type="checkbox"].toggle-switch:checked { background: #2196f3; }
    header.app-header input[type="checkbox"].toggle-switch:checked::before { transform: translateX(20px); }

    /* LAYOUT & PANEL GRIDS */
    .state-info { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .state-section { flex: 0 0 50%; background: var(--card); padding: 10px 16px; font-size: 13px; }
    #roomStats { display: flex; gap: 20px; align-items: center; }
    #roomStats b { color: var(--name); }

    .main-grid { display: flex; height: calc(100% - 115px); gap: 1px; background: var(--border); }
    .panel { background: var(--card); display: flex; flex-direction: column; overflow: hidden; }
    .panel-chat { flex: 0 0 35%; }
    .panel-req { flex: 0 0 27%; }
    .panel-gift { flex: 0 0 19%; }
    .panel-action { flex: 0 0 19%; }

    .panel h3 {
      margin: 0; padding: 8px; text-align: center; font-size: 14px; font-weight: 700;
      background: var(--header-bg); border-bottom: 1px solid var(--border); letter-spacing: 0.05em;
    }

    .chatListContainer { flex: 1; overflow-y: auto; padding: 10px; }

    /* UI MESSAGE CARD & TRANSTIONS */
    .msg { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-bottom: 8px; transition: var(--transition-smooth); }
    .msg:hover { background: var(--hover); transform: translateX(2px); }
    .msg.selected { background: rgba(255, 152, 0, 0.1); border-color: var(--orange); }
    .chat-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
    .time { font-size: 10px; opacity: 0.6; background: var(--bg); padding: 2px 4px; border-radius: 4px; }
    .name { color: var(--name); font-weight: 600; font-size: 13px; }
    .uid { font-size: 11px; color: var(--uid); }

    .btn-pin-action { margin-left: auto; background: none; border: none; cursor: pointer; opacity: 0.6; transition: var(--transition-smooth); }
    .btn-pin-action:hover { opacity: 1; transform: scale(1.1); }
    .btn-pin-action svg { width: 16px; height: 16px; fill: var(--orange); }

    /* REQ PIN CONTAINER */
    .req { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; margin-bottom: 8px; background: var(--card); border: 1px solid #ef4444; border-radius: 6px; transition: var(--transition-smooth); }
    .req.done { border-color: #10b981; }
    .req-message { color: #ef4444; transition: var(--transition-smooth); }
    .req.done .req-message { color: #10b981; text-decoration: line-through; opacity: 0.6; }
    .req-controls { display: flex; gap: 8px; align-items: center; }
    .req-btn { background: none; border: none; cursor: pointer; opacity: 0.7; transition: var(--transition-smooth); }
    .req-btn:hover { opacity: 1; transform: scale(1.1); }
    .req-btn svg { width: 18px; height: 18px; }

    /* DRAGGABLE POPUPS */
    .rankPopup { position: fixed; width: 340px; height: 400px; background: var(--card); border: 1px solid var(--name); border-radius: 8px; box-shadow: 0 10px 25px var(--shadow); z-index: 999; display: flex; flex-direction: column; overflow: hidden; }
    .rankHeader { padding: 10px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: move; font-weight: bold; font-size: 13px; }
    .rankList { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .rankItem { display: flex; align-items: center; gap: 8px; padding: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
    .rankAvatar { width: 24px; height: 24px; border-radius: 50%; }

    @media (max-width: 768px) {
      .main-grid { flex-direction: column; overflow-y: auto; }
      .panel { flex: none; height: 300px; }
    }
  </style>
</head>

<body>

  <header class="app-header" role="banner">
    <input id="username" class="input-user" placeholder="Nhập @Unique_ID..." aria-label="Nhập TikTok Live ID muốn kết nối">
    <button id="connect" class="btn-control btn-connect" aria-label="Bấm để kết nối tới luồng Livestream">Connect</button>
    <button id="clear" class="btn-control btn-clear" aria-label="Xóa dữ liệu màn hình tạm thời">Clear</button>
    
    <div class="flex items-center gap-4 ml-2">
      <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
        <input type="checkbox" id="showId" class="toggle-switch" aria-label="Hiển thị hoặc ẩn ID người dùng"> ID
      </label>
      <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
        <input type="checkbox" id="hideTime" class="toggle-switch" aria-label="Hiển thị hoặc ẩn mốc thời gian"> Time
      </label>
      <label class="flex items-center gap-2 text-sm font-medium cursor-pointer">
        <input type="checkbox" id="theme" class="toggle-switch" aria-label="Chuyển sang chế độ màn hình sáng hoặc tối"> Light
      </label>
    </div>

    <button id="showGiftsRank" class="btn-control btn-gift-rank" aria-label="Mở cửa sổ xếp hạng quà tặng">Gifts Rank</button>
    <button id="showLikesRank" class="btn-control btn-like-rank" aria-label="Mở cửa sổ xếp hạng lượt thích">Likes Rank</button>
    <div id="currentLive" class="ml-auto text-sm font-semibold" aria-live="polite"></div>
  </header>

  <section class="state-info" aria-label="Thông báo trạng thái kết nối máy chủ">
    <div class="state-section font-mono text-yellow-500" id="stateText" aria-live="assertive">Disconnected</div>
    <div class="state-section" id="roomStats" aria-live="polite"></div>
  </section>

  <main class="main-grid" role="main">
    <section class="panel panel-chat" aria-labelledby="title-chat">
      <h3 id="title-chat">LIVE CHAT</h3>
      <div class="chatListContainer" role="log" aria-live="polite"><div id="chat"></div></div>
    </section>
    
    <section class="panel panel-req" aria-labelledby="title-req">
      <h3 id="title-req">YÊU CẦU GHIM</h3>
      <div class="chatListContainer"><div id="request"></div></div>
    </section>

    <section class="panel panel-gift" aria-labelledby="title-gift">
      <h3 id="title-gift">QUÀ TẶNG</h3>
      <div class="chatListContainer" role="log" aria-live="polite"><div id="gifts"></div></div>
    </section>

    <section class="panel panel-action" aria-labelledby="title-action">
      <h3 id="title-action">TƯƠNG TÁC</h3>
      <div class="chatListContainer" role="log" aria-live="polite"><div id="actions"></div></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ==========================================================================
    // INDUSTRIAL UTILITIES & MODULES (PURE FUNCTIONS FOR EASY TESTING)
    // ==========================================================================
    const Utils = {
      // Hàm Clean XSS cực đoan đảm bảo tính nhất quán trên toàn hệ thống
      sanitize: (str) => {
        if (typeof str !== 'string') return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#x27;')
          .replace(/\//g, '&#x2F;');
      },
      getTime: () => {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
      },
      generateLink: (u) => {
        const safeUid = Utils.sanitize(u.uniqueId);
        const safeNick = Utils.sanitize(u.nickname || u.displayName || 'User');
        return `<a href="https://www.tiktok.com/@${safeUid}" target="_blank" rel="noopener" class="name hover:underline">${safeNick}</a>`;
      }
    };

    // ==========================================================================
    // STATE CONFIGURATION
    // ==========================================================================
    const CONFIG = {
      UI: { CHAT: { MAX: 1000, BATCH: 80 }, GIFTS: { MAX: 300, BATCH: 40 }, ACTIONS: { MAX: 500, BATCH: 40 } },
      BACKOFF: { INIT_DELAY: 1500, MAX_DELAY: 15000, MAX_ATTEMPTS: 5 }
    };

    const STATE = {
      showIdEnabled: false,
      showTimeEnabled: false,
      giftDictionaryMap: {},
      stats: { viewers: 0, likes: 0, diamonds: 0 },
      rankings: { gifts: {}, likes: {} },
      chatQueue: []
    };

    const DOM = {
      chat: document.getElementById('chat'),
      request: document.getElementById('request'),
      gifts: document.getElementById('gifts'),
      actions: document.getElementById('actions'),
      currentLive: document.getElementById('currentLive'),
      stateText: document.getElementById('stateText'),
      username: document.getElementById('username'),
      roomStats: document.getElementById('roomStats'),
      connectBtn: document.getElementById('connect')
    };

    const SVGS = {
      pin: `<svg viewBox="0 0 24 24"><path d="M16 12V4h1c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1h1v8l-2 2v2h5v6l1 1 1-1v-6h5v-2l-2-2zm-2 0l-1 1-1-1V4h2v8z"/></svg>`,
      trash: `<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`,
      uncheck: `<svg viewBox="0 0 24 24"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>`,
      checked: `<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`
    };

    let backendUrl = location.protocol === 'file:' ? "https://tiktok-chat-reader.zerody.one/" : undefined;

    async function loadGiftDictionary() {
      try {
        const response = await fetch('./vi-VN.json');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        STATE.giftDictionaryMap = await response.json();
      } catch (err) {
        DOM.stateText.textContent = "⚠️ Lỗi nạp dữ liệu từ điển tiếng Việt. Tên quà tặng gốc sẽ được sử dụng.";
      }
    }
    loadGiftDictionary();

    // ==========================================================================
    // PERFORMANCE SYSTEM - DYNAMIC THROTTLING (rAF LOOP)
    // ==========================================================================
    const PerformanceMonitor = {
      lastFrameTime: performance.now(),
      optimalBatchSize: 30,

      // Điều tiết động dựa trên tần số đáp ứng đồ họa thực tế của thiết bị người dùng
      getOptimalBatch: () => {
        const now = performance.now();
        const delta = now - PerformanceMonitor.lastFrameTime;
        PerformanceMonitor.lastFrameTime = now;

        if (delta > 16.7) { // Thiết bị đang nghẽn (Dưới 60 FPS) -> Giảm tải render
          PerformanceMonitor.optimalBatchSize = Math.max(10, PerformanceMonitor.optimalBatchSize - 2);
        } else { // Thiết bị mượt -> Tăng chỉ tiêu nạp hàng đợi để hiển thị nhanh hơn
          PerformanceMonitor.optimalBatchSize = Math.min(80, PerformanceMonitor.optimalBatchSize + 1);
        }
        return PerformanceMonitor.optimalBatchSize;
      }
    };

    const UIManager = {
      cleanDOM: (parent, cfg) => {
        const len = parent.children.length;
        if (cfg.MAX > 0 && len > cfg.MAX) {
          const range = document.createRange();
          range.setStartBefore(parent.firstChild);
          range.setEndAfter(parent.children[Math.min(cfg.BATCH, len) - 1]);
          range.deleteContents();
        }
      },

      renderLoop: () => {
        if (STATE.chatQueue.length > 0) {
          UIManager.cleanDOM(DOM.chat, CONFIG.UI.CHAT);
          const frag = document.createDocumentFragment();
          
          // Lấy giới hạn lô hàng quét động thay vì cố định số cứng
          const batchLimit = PerformanceMonitor.getOptimalBatch();
          const currentBatch = STATE.chatQueue.splice(0, batchLimit);

          currentBatch.forEach(item => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
              <div class="chat-head">
                <img class="avatar" src="${Utils.sanitize(item.user.profilePictureUrl)}" alt="">
                <span class="time" style="display: ${STATE.showTimeEnabled ? 'inline' : 'none'}">[${item.time}]</span>
                <span>${Utils.generateLink(item.user)}</span>
                <span class="uid" style="display: ${STATE.showIdEnabled ? 'inline' : 'none'}">@${Utils.sanitize(item.user.uniqueId)}</span>
                <button class="btn-pin-action" aria-label="Ghim tin nhắn">${SVGS.pin}</button>
              </div>
              <div class="pl-8 text-sm break-all">${Utils.sanitize(item.text)}</div>
            `;
            div.querySelector('.btn-pin-action').onclick = () => UIManager.pinToRequest(item.user, item.text, div);
            frag.appendChild(div);
          });

          DOM.chat.appendChild(frag);
          if (DOM.chat.parentElement._autoScroll) {
            DOM.chat.parentElement.scrollTop = DOM.chat.parentElement.scrollHeight;
          }
        } else {
          PerformanceMonitor.lastFrameTime = performance.now();
        }
        requestAnimationFrame(UIManager.renderLoop);
      },

      setLoading: (isLoading) => {
        if (isLoading) {
          DOM.connectBtn.disabled = true;
          DOM.connectBtn.innerHTML = `<span class="spinner"></span>Connecting...`;
          DOM.stateText.classList.add('pulse-connecting');
        } else {
          DOM.connectBtn.disabled = false;
          DOM.connectBtn.innerHTML = 'Connect';
          DOM.stateText.classList.remove('pulse-connecting');
        }
      },

      pinToRequest: (user, text, element) => {
        element.classList.add('selected');
        const div = document.createElement('div');
        div.className = 'req';
        div.innerHTML = `
          <div class="text-sm"><b class="text-blue-400">${Utils.sanitize(user.nickname)}</b>: <span class="req-message">${Utils.sanitize(text)}</span></div>
          <div class="req-controls">
            <button class="req-btn btn-check" aria-label="Xác nhận hoàn thành hoặc khôi phục yêu cầu">${SVGS.uncheck}</button>
            <button class="req-btn btn-del" aria-label="Gỡ bỏ hoàn toàn yêu cầu ghim">${SVGS.trash}</button>
          </div>
        `;
        DOM.request.appendChild(div);
      },

      renderGift: (data) => {
        UIManager.cleanDOM(DOM.gifts, CONFIG.UI.GIFTS);
        const streakKey = `${data.userId}_${data.giftId}`;
        const oldNode = DOM.gifts.querySelector(`[data-streak="${streakKey}"]`);
        const nameVN = STATE.giftDictionaryMap[`live_gift_${data.giftId}`] || data.giftName;
        
        const div = document.createElement('div');
        div.className = 'p-2 mb-2 bg-gray-800 border border-gray-700 rounded flex gap-3 text-xs';
        if (data.giftType === 1 && !data.repeatEnd) div.setAttribute('data-streak', streakKey);

        div.innerHTML = `
          <img class="w-8 h-8 rounded-full" src="${Utils.sanitize(data.profilePictureUrl)}" alt="">
          <div class="flex-1">
            <div class="font-semibold text-blue-300">${Utils.sanitize(data.nickname)}</div>
            <div>Gửi tặng: <b class="text-yellow-400">${Utils.sanitize(nameVN)}</b></div>
            <div class="mt-1 flex items-center gap-2">
              <img class="w-8 h-8 bg-gray-900 rounded p-1" src="${Utils.sanitize(data.giftPictureUrl)}" alt="">
              <div>
                <div>Số lượng: <span class="text-red-400 font-bold">x${data.repeatCount}</span></div>
                <div>Trị giá: <b>${(data.diamondCount * data.repeatCount).toLocaleString()} 💎</b></div>
              </div>
            </div>
          </div>
        `;
        if (oldNode) oldNode.replaceWith(div);
        else DOM.gifts.appendChild(div);
      },

      renderAction: (user, text, color) => {
        UIManager.cleanDOM(DOM.actions, CONFIG.UI.ACTIONS);
        const div = document.createElement('div');
        div.className = 'p-2 mb-2 border border-gray-700 bg-opacity-40 bg-gray-800 rounded flex items-center gap-2 text-xs transition-opacity duration-300';
        div.innerHTML = `
          <img class="w-6 h-6 rounded-full" src="${Utils.sanitize(user.profilePictureUrl || 'https://ui-avatars.com/api/?name=U')}" alt="">
          <div><b>${Utils.sanitize(user.nickname)}</b> <span style="color:${color}">${Utils.sanitize(text)}</span></div>
        `;
        DOM.actions.appendChild(div);
      }
    };

    requestAnimationFrame(UIManager.renderLoop);

    // ==========================================================================
    // SOCKET NETWORK CONTROL WITH ADVANCED RETRY LOGIC
    // ==========================================================================
    class TikTokCoreConnection {
      constructor(url) {
        this.url = url; this.attempt = 0; this.io = null; this.targetId = null;
        this.initSocket();
      }

      initSocket() {
        this.io = io(this.url, { reconnection: false, timeout: 10000 });
        
        this.io.on('connect', () => {
          this.attempt = 0;
          if (this.targetId) this.io.emit('setUniqueId', this.targetId, { enableExtendedGiftInfo: true });
        });

        this.io.on('connect_error', (err) => this.fallback(`Lỗi mạng kết nối Server Proxy: ${err.message}`));
        this.io.on('disconnect', () => this.fallback('Đứt liên kết kênh dữ liệu Proxy.'));
        this.io.on('streamEnd', () => { DOM.stateText.textContent = "🔒 Buổi Live Stream đã kết thúc từ phía Streamer."; this.targetId = null; UIManager.setLoading(false); });
        this.io.on('tiktokDisconnected', (err) => DOM.stateText.textContent = `❌ Lỗi luồng TikTok: ${Utils.sanitize(err)}`);
      }

      fallback(reason) {
        if (!this.targetId) return;
        UIManager.setLoading(false);
        if (this.attempt >= CONFIG.BACKOFF.MAX_ATTEMPTS) {
          DOM.stateText.textContent = "❌ Lỗi: Không thể kết nối lại sau nhiều lần thử. Vui lòng bấm Connect thử lại.";
          return;
        }
        this.attempt++;
        const delay = Math.min(CONFIG.BACKOFF.INIT_DELAY * Math.pow(2, this.attempt), CONFIG.BACKOFF.MAX_DELAY);
        DOM.stateText.textContent = `⚠️ ${reason} Thử lại lần ${this.attempt}/${CONFIG.BACKOFF.MAX_ATTEMPTS} sau ${(delay/1000).toFixed(1)}s...`;
        
        setTimeout(() => { this.io.close(); this.initSocket(); this.io.connect(); }, delay);
      }

      connect(uniqueId) {
        this.targetId = uniqueId;
        this.attempt = 0;
        UIManager.setLoading(true);
        this.io.emit('setUniqueId', this.targetId, { enableExtendedGiftInfo: true });

        return new Promise((resolve, reject) => {
          this.io.once('tiktokConnected', (res) => { UIManager.setLoading(false); resolve(res); });
          this.io.once('tiktokDisconnected', (err) => { UIManager.setLoading(false); reject(err); });
        });
      }

      on(ev, cb) { this.io.on(ev, cb); }
    }

    const connection = new TikTokCoreConnection(backendUrl);

    // ==========================================================================
    // LEADERBOARD CONTROL MODULE
    // ==========================================================================
    const RankManager = {
      track: (type, user, val) => {
        const id = user.userId || user.uniqueId; if (!id) return;
        if (!STATE.rankings[type][id]) STATE.rankings[type][id] = { user, score: 0 };
        STATE.rankings[type][id].score += val;
        if (document.getElementById(`popup_${type}`)) RankManager.drawList(type);
      },
      open: (type, title, x, y) => {
        const id = `popup_${type}`; if (document.getElementById(id)) { document.getElementById(id).remove(); return; }
        const pop = document.createElement('div'); pop.id = id; pop.className = 'rankPopup'; pop.style.left = x; pop.style.top = y;
        pop.innerHTML = `
          <div class="rankHeader"><span>${title}</span><button class="text-red-500 font-bold w-5 h-5 flex items-center justify-center rounded hover:bg-gray-700 btn-close-pop" aria-label="Đóng bảng xếp hạng">✕</button></div>
          <div class="rankList" id="list_${type}"></div>
        `;
        pop.querySelector('.btn-close-pop').onclick = () => pop.remove();
        document.body.appendChild(pop);
        RankManager.bindDrag(pop);
        RankManager.drawList(type);
      },
      drawList: (type) => {
        const box = document.getElementById(`list_${type}`); if (!box) return;
        const sorted = Object.values(STATE.rankings[type]).sort((a, b) => b.score - a.score);
        box.innerHTML = sorted.map((item, i) => `
          <div class="rankItem text-xs">
            <span class="font-bold text-gray-500 w-4">${i+1}</span>
            <img class="rankAvatar" src="${Utils.sanitize(item.user.profilePictureUrl)}" alt="">
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-blue-400 truncate">${Utils.sanitize(item.user.nickname)}</div>
              <div class="opacity-70">${type === 'gifts' ? '💎' : '❤️'} ${item.score.toLocaleString()}</div>
            </div>
          </div>
        `).join('') || '<div class="text-center p-4 text-gray-500">Chưa có dữ liệu xếp hạng</div>';
      },
      bindDrag: (el) => {
        const header = el.querySelector('.rankHeader');
        let active = false, initialX, initialY;
        header.addEventListener('mousedown', (e) => {
          if (e.target.closest('button')) return;
          initialX = e.clientX - el.offsetLeft; initialY = e.clientY - el.offsetTop; active = true;
          const drag = (ev) => { if (!active) return; el.style.left = `${ev.clientX - initialX}px`; el.style.top = `${ev.clientY - initialY}px`; };
          const stop = () => { active = false; document.removeEventListener('mousemove', drag); document.removeEventListener('mouseup', stop); };
          document.addEventListener('mousemove', drag); document.addEventListener('mouseup', stop);
        });
      }
    };

    // ==========================================================================
    // CORE APP EVENTS INITIALIZATION
    // ==========================================================================
    connection.on('roomUser', msg => {
      if (msg.viewerCount) STATE.stats.viewers = msg.viewerCount;
      DOM.roomStats.innerHTML = `<div>Mắt xem: <b>${STATE.stats.viewers.toLocaleString()}</b></div><div>Likes: <b>${STATE.stats.likes.toLocaleString()}</b></div><div>Kim cương: <b>${STATE.stats.diamonds.toLocaleString()}</b></div>`;
      if (msg.owner) DOM.currentLive.innerHTML = `<span class="text-green-400">● Live:</span> <b class="text-blue-300">${Utils.sanitize(msg.owner.nickname)}</b>`;
    });

    connection.on('chat', msg => STATE.chatQueue.push({ user: msg, text: msg.comment, time: Utils.getTime() }));
    connection.on('like', msg => {
      STATE.stats.likes = msg.totalLikeCount || STATE.stats.likes;
      UIManager.renderAction(msg, `đã thả tim x${msg.likeCount}`, '#60a5fa');
      RankManager.track('likes', msg, msg.likeCount);
    });

    connection.on('gift', msg => {
      if (!(msg.giftType === 1 && !msg.repeatEnd) && msg.diamondCount > 0) {
        const total = msg.diamondCount * msg.repeatCount;
        STATE.stats.diamonds += total;
        RankManager.track('gifts', msg, total);
      }
      UIManager.renderGift(msg);
    });

    connection.on('member', msg => UIManager.renderAction(msg, 'vừa vào phòng', '#f59e0b'));
    connection.on('follow', msg => UIManager.renderAction(msg, 'đã follow kênh', '#f43f5e'));
    connection.on('share', msg => UIManager.renderAction(msg, 'đã chia sẻ live', '#10b981'));

    DOM.request.onclick = (e) => {
      const item = e.target.closest('.req'); if (!item) return;
      if (e.target.closest('.btn-del')) item.remove();
      else if (e.target.closest('.btn-check')) {
        const isDone = item.classList.toggle('done');
        e.target.closest('.btn-check').innerHTML = isDone ? SVGS.checked : SVGS.uncheck;
      }
    };

    DOM.connectBtn.onclick = () => {
      const userVal = DOM.username.value.trim(); if (!userVal) return alert('Hãy nhập Live ID trước!');
      DOM.stateText.textContent = "🚀 Đang định vị luồng phát...";
      connection.connect(userVal).then(info => {
        DOM.stateText.textContent = `✅ Đang giải mã Room ID: ${info.roomId}`;
      }).catch(err => {
        DOM.stateText.textContent = `❌ Thất bại: ${err.message || err}`;
      });
    };

    document.getElementById('clear').onclick = () => { ['chat', 'request', 'gifts', 'actions', 'currentLive'].forEach(id => DOM[id].innerHTML = ''); STATE.chatQueue = []; };
    document.getElementById('showGiftsRank').onclick = () => RankManager.open('gifts', 'Xếp hạng đóng góp Quà', '20px', '160px');
    document.getElementById('showLikesRank').onclick = () => RankManager.open('likes', 'Xếp hạng tốc độ Thả Tim', '380px', '160px');
    document.getElementById('showId').onchange = (e) => { STATE.showIdEnabled = e.target.checked; document.querySelectorAll('.uid').forEach(el => el.style.display = STATE.showIdEnabled ? 'inline' : 'none'); };
    document.getElementById('hideTime').onchange = (e) => { STATE.showTimeEnabled = e.target.checked; document.querySelectorAll('.time').forEach(el => el.style.display = STATE.showTimeEnabled ? 'inline' : 'none'); };
    document.getElementById('theme').onchange = (e) => document.documentElement.classList.toggle('light', e.target.checked);

    document.querySelectorAll('.chatListContainer').forEach(box => {
      box._autoScroll = true;
      box.onscroll = () => box._autoScroll = (box.scrollTop + box.clientHeight >= box.scrollHeight - 12);
    });
  </script>
</body>

</html>
